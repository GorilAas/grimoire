spring:
  application:
    name: grimoire

  datasource:
    url: ${SUPABASE_URL}
    username: ${SUPABASE_USERNAME}
    password: ${SUPABASE_PASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: false

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:PaoFresQUIM-chave-secreta-super-segura-minimo-256bits-aqui!}
  expiration-ms: 86400000  # 24 horas

admin:
  senha: ${ADMIN_PASSWORD:FresQUIM@2025!}

groq:
  api-key: ${GROQ_API_KEY}
  modelo: llama-3.3-70b-versatile

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
    username: postgres.mkeeygtjrktjherjtciz
    password: ${SUPABASE_PASSWORD}

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        connection:
          provider_disables_autocommit: true
