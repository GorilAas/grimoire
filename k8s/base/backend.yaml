apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimoire-backend
  namespace: grimoire
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grimoire-backend
  template:
    metadata:
      labels:
        app: grimoire-backend
    spec:
      containers:
        - name: grimoire-backend
          image: SEU_USUARIO/grimoire-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: grimoire-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/grimoiredb
            - name: SPRING_PROFILES_ACTIVE
              value: docker
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: grimoire-backend
  namespace: grimoire
spec:
  selector:
    app: grimoire-backend
  ports:
    - port: 8080
